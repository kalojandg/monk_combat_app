<div class="section-title">Name Gen</div>

<!-- избор на тип -->
<div class="flavor-grid" id="genTypeButtons">
  <button class="flavor-btn active" data-gentype="alias">Alias</button>
  <button class="flavor-btn" data-gentype="familiar">Familiar</button>
  <button class="flavor-btn" data-gentype="npc">NPC</button>
</div>

<!-- под-UI за NPC (раса/пол) — видимо само при активен NPC тип -->
<div id="genNpcOptions" class="npc-options hidden">
  <fieldset class="npc-fieldset">
    <legend>Race</legend>
    <label><input type="radio" name="genNpcRace" value="human" checked> Human</label>
    <label><input type="radio" name="genNpcRace" value="elf"> Elf</label>
    <label><input type="radio" name="genNpcRace" value="dwarf"> Dwarf</label>
    <label><input type="radio" name="genNpcRace" value="halfling"> Halfling</label>
    <label><input type="radio" name="genNpcRace" value="tiefling"> Tiefling</label>
    <label><input type="radio" name="genNpcRace" value="orc"> Orc</label>
    <label><input type="radio" name="genNpcRace" value="toblin"> Toblin</label>
  </fieldset>

  <fieldset class="npc-fieldset" id="genNpcGenderGroup">
    <legend>Gender</legend>
    <label><input type="radio" name="genNpcGender" value="male" checked> Male</label>
    <label><input type="radio" name="genNpcGender" value="female"> Female</label>
  </fieldset>
</div>

<!-- под-UI за Familiar (7 групи) — видимо само при активен Familiar тип -->
<div id="genFamGroups" class="fam-groups hidden">
  <button class="fam-btn" data-famcat="feline">Feline</button>
  <button class="fam-btn" data-famcat="canine">Canine</button>
  <button class="fam-btn" data-famcat="avian">Avian</button>
  <button class="fam-btn" data-famcat="rodentia">Rodentia</button>
  <button class="fam-btn" data-famcat="creepycrawlies">Creepycrawlies</button>
  <button class="fam-btn" data-famcat="aquatic">Aquatic</button>
  <button class="fam-btn" data-famcat="arcane">Arcane</button>
</div>

<!-- изходна зона + действия -->
<input id="genOutput" type="text" readonly placeholder="(generate a name)">
<div class="one-liner-box mb-12">
  <button id="genGenerate" class="primary">Generate</button>
  <button id="genSave" disabled>Save</button>
</div>

<!-- таблица-лог на активния тип -->
<div id="genLog"></div>

<!-- модал за Alias -->
<div id="genAliasModal" class="modal hidden">
  <div class="modal__card">
    <div class="modal__title">На кого си се представил така?</div>
    <textarea id="genAliasToInput" rows="5" placeholder="Име/описание на човека, ситуация, бележки..."></textarea>
    <div class="modal__actions">
      <button id="genAliasCancel">Отказ</button>
      <button id="genAliasConfirm">Запази</button>
    </div>
  </div>
</div>

<!-- модал за Familiar -->
<div id="genFamModal" class="modal hidden">
  <div class="modal__card">
    <div class="modal__title">На кого/какво е това име?</div>
    <textarea id="genFamNoteInput" rows="5"
      placeholder="напр. „ястребът на Майора“, 'паяк в шапката', 'вълкът на друида'…"></textarea>
    <div class="modal__actions">
      <button id="genFamCancel">Отказ</button>
      <button id="genFamConfirm">Запази</button>
    </div>
  </div>
</div>

<!-- модал за NPC -->
<div id="genNpcModal" class="modal hidden">
  <div class="modal__card">
    <div class="modal__title">Who is this?</div>
    <textarea id="genNpcNoteInput" rows="4" placeholder="Role, location, notes..."></textarea>
    <div class="modal__actions">
      <button id="genNpcCancel">Cancel</button>
      <button id="genNpcConfirm" class="primary">Save</button>
    </div>
  </div>
</div>
